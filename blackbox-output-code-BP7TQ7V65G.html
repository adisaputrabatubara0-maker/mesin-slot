<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 Slot Ajaib Buah-Buahan - Petualangan Pintar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', cursive;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a8edea, #fed6e3);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        @keyframes gradientBG { 
            0% {background-position: 0% 50%;} 
            25% {background-position: 100% 50%;} 
            50% {background-position: 100% 100%;} 
            75% {background-position: 0% 100%;} 
            100% {background-position: 0% 50%;} 
        }
        
        .slot-machine {
            background: linear-gradient(145deg, #fff, #f0f0f0);
            border-radius: 30px; padding: 40px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
            max-width: 500px; width: 100%; text-align: center;
            position: relative; overflow: hidden;
        }
        .slot-machine::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 10px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #ffd93d, #6bcf7f);
            border-radius: 30px 30px 0 0;
        }
        
        h1 { 
            color: #ff6b6b; font-size: 2.8em; margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
        }
        .subtitle { 
            color: #4ecdc4; font-size: 1.3em; margin-bottom: 30px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 
            40% { transform: translateY(-10px); } 
            60% { transform: translateY(-5px); } 
        }
        
        .reels {
            display: flex; justify-content: center; gap: 15px; margin: 30px 0;
            perspective: 1000px;
        }
        .reel {
            width: 120px; height: 120px; 
            background: linear-gradient(145deg, #fff, #f8f8f8);
            border: 6px solid #ff6b6b; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 4em; position: relative; overflow: hidden;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.1), 0 10px 25px rgba(0,0,0,0.2);
            transition: all 0.1s ease;
        }
        .reel.spinning {
            animation: spinReel 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes spinReel {
            0% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(360deg) scale(1); }
        }
        .reel.win { 
            border-color: #ffd93d; 
            box-shadow: 0 0 30px #ffd93d, inset 0 5px 15px rgba(255,217,61,0.3);
            animation: winGlow 1s infinite alternate;
        }
        @keyframes winGlow {
            from { box-shadow: 0 0 30px #ffd93d, inset 0 5px 15px rgba(255,217,61,0.3); }
            to { box-shadow: 0 0 50px #ffd93d, 0 0 20px #ffd93d, inset 0 5px 15px rgba(255,217,61,0.5); }
        }
        
        .spin-btn {
            background: linear-gradient(45deg, #4ecdc4, #44bdad);
            color: white; border: none; 
            width: 200px; height: 70px; font-size: 2em;
            border-radius: 40px; cursor: pointer; margin: 30px 0;
            font-family: inherit; font-weight: bold;
            box-shadow: 0 15px 35px rgba(78,205,196,0.4);
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .spin-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 45px rgba(78,205,196,0.6);
        }
        .spin-btn:active { transform: translateY(-2px); }
        .spin-btn:disabled {
            background: #ccc; cursor: not-allowed; transform: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .spin-btn::after {
            content: '🎰'; position: absolute; font-size: 1.5em;
            left: 50%; top: 50%; transform: translate(-50%,-50%);
            transition: all 0.3s ease;
        }
        .spin-btn:not(:disabled)::after { transform: translate(-50%,-50%) rotate(180deg); }
        
        .score-board {
            background: rgba(255,255,255,0.9); border-radius: 20px;
            padding: 20px; margin: 20px 0; backdrop-filter: blur(10px);
        }
        .score { 
            font-size: 2.5em; color: #ff6b6b; font-weight: bold;
            margin: 10px 0;
        }
        .message {
            font-size: 1.5em; color: #4ecdc4; margin: 15px 0;
            min-height: 50px; display: flex; align-items: center; justify-content: center;
        }
        .win-message { color: #ffd93d; animation: flash 0.5s infinite; }
        @keyframes flash { 50% { opacity: 0.7; } }
        
        .fruits { font-size: 1.2em; margin-top: 10px; }
        .instruction {
            color: #666; font-size: 1.1em; margin-top: 20px;
            background: rgba(255,255,255,0.7); padding: 15px;
            border-radius: 15px; border-left: 5px solid #4ecdc4;
        }
        
        @media (max-width: 500px) {
            .reel { width: 90px; height: 90px; font-size: 3em; }
            .spin-btn { width: 160px; height: 60px; font-size: 1.6em; }
            h1 { font-size: 2.2em; }
        }
    </style>
</head>
<body>
    <div class="slot-machine">
        <h1>🎰 Slot Ajaib</h1>
        <p class="subtitle">Buah-Buahan</p>
        
        <div class="reels">
            <div class="reel" id="reel1">🍎</div>
            <div class="reel" id="reel2">🍌</div>
            <div class="reel" id="reel3">🍊</div>
        </div>
        
        <button class="spin-btn" id="spinBtn" onclick="spin()">MULAI MAIN!</button>
        
        <div class="score-board">
            <div class="score" id="score">⭐ 0</div>
            <div class="message" id="message">Klik tombol untuk main!</div>
            <div class="fruits" id="fruits"></div>
        </div>
        
        <div class="instruction">
            🎯 <strong>Tekan MULAI MAIN!</strong> <br>
            ✨ Cocokkan 3 buah sama = Menang Bintang! ⭐<br>
            🍎 Buah berbeda = Belajar warna baru!
        </div>
    </div>

    <script>
        const fruits = ['🍎','🍏','🍌','🍊','🍇','🍉','🍓','🍍','🥝','🍒'];
        const reels = ['reel1','reel2','reel3'].map(id => document.getElementById(id));
        const spinBtn = document.getElementById('spinBtn');
        const scoreEl = document.getElementById('score');
        const messageEl = document.getElementById('message');
        const fruitsEl = document.getElementById('fruits');
        
        let score = 0;
        let isSpinning = false;
        
        function spin() {
            if (isSpinning) return;
            
            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.textContent = 'BERPUTAR...';
            messageEl.textContent = 'Buah-buahan berputar! ⏳';
            
            // Spin animation
            reels.forEach(reel => {
                reel.classList.add('spinning');
                let spinCount = 0;
                const spinInterval = setInterval(() => {
                    reel.textContent = fruits[Math.floor(Math.random() * fruits.length)];
                    spinCount++;
                    if (spinCount > 15) {
                        clearInterval(spinInterval);
                        reel.classList.remove('spinning');
                    }
                }, 80);
            });
            
            // Stop reels with result
            setTimeout(() => {
                const result = generateResult();
                reels[0].textContent = result[0];
                reels[1].textContent = result[1];
                reels[2].textContent = result[2];
                
                setTimeout(() => {
                    checkWin(result);
                    isSpinning = false;
                    spinBtn.disabled = false;
                    spinBtn.textContent = 'MAIN LAGI!';
                }, 800);
            }, 1200);
        }
        
        function generateResult() {
            // 30% chance for win (3 same), 70% mixed
            if (Math.random() < 0.3) {
                const winFruit = fruits[Math.floor(Math.random() * fruits.length)];
                return [winFruit, winFruit, winFruit];
            } else {
                return Array(3).fill().map(() => fruits[Math.floor(Math.random() * fruits.length)]);
            }
        }
        
        function checkWin(result) {
            const [r1, r2, r3] = result;
            
            if (r1 === r2 && r2 === r3) {
                // BIG WIN!
                score += 10;
                reels.forEach(reel => reel.classList.add('win'));
                messageEl.textContent = '🎉 WOW! 3 SAMA! MENANG BESAR! ⭐⭐⭐';
                messageEl.classList.add('win-message');
                fruitsEl.innerHTML = `Menang: ${r1} ${r1} ${r1}`;
                
                // Win sound effect (visual)
                document.body.style.animationDuration = '0.5s';
                setTimeout(() => document.body.style.animationDuration = '12s', 1000);
            } else {
                // Learning mode
                messageEl.textContent = '💡 Belajar buah baru! Coba lagi ya!';
                messageEl.classList.remove('win-message');
                fruitsEl.innerHTML = `Buah: ${r1} ${r2} ${r3}`;
                score += 1; // Participation score
            }
            
            scoreEl.textContent = `⭐ ${score}`;
        }
        
        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isSpinning) {
                e.preventDefault();
                spin();
            }
        });
        
        // Auto-play demo (optional)
        setTimeout(() => {
            if (score === 0) spin();
        }, 2000);
    </script>
</body>
</html>
